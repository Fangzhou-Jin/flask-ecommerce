services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-ecommerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecommerce123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      SQLALCHEMY_DATABASE_URI: mysql+pymysql://${MYSQL_USER:-ecommerce}:${MYSQL_PASSWORD:-ecommerce123}@mysql:3306/${MYSQL_DATABASE:-ecommerce}?charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
